<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guardi — YouTube time's up!</title>
    <link rel="stylesheet" href="guardi-ui.css" />
    <style>
      .guardi-blocked-card {
        max-width: 560px;
        border-color: var(--guardi-pink-hot);
        box-shadow: 0 16px 48px var(--guardi-shadow);
      }
      .guardi-blocked-title {
        color: var(--guardi-blue-deep);
      }
      .guardi-blocked-btn {
        display: inline-flex;
        margin-top: 20px;
        padding: 12px 24px;
        border-radius: 999px;
        border: 3px solid var(--guardi-blue);
        background: linear-gradient(135deg, var(--guardi-pink) 0%, var(--guardi-sky) 100%);
        font-family: var(--guardi-font-display);
        font-weight: 700;
        font-size: 1rem;
        color: var(--guardi-text-soft);
        text-decoration: none;
        box-shadow: 0 8px 24px var(--guardi-shadow);
      }
    </style>
  </head>
  <body class="guardi-newtab guardi-blocked-page guardi-youtube-limit-page">
    <div class="guardi-sky">
      <main class="guardi-page" role="main">
        <section class="guardi-card guardi-blocked-card" aria-labelledby="guardi-youtube-title">
          <img
            class="guardi-mascot"
            src="assets/guardi-mascot.png"
            width="140"
            height="158"
            alt=""
            aria-hidden="true"
          />
          <h1 class="guardi-title guardi-blocked-title" id="guardi-youtube-title" data-guardi="youtube-limit-title">
            YouTube time's up!
          </h1>
          <p class="guardi-subtitle" data-guardi="youtube-limit-subtitle">
            You've used today's YouTube allowance.
          </p>
          <p class="guardi-body" data-guardi="youtube-limit-body">
            Ask your Dom nicely if you need more watch time — or come back tomorrow when the clock resets.
          </p>
          <p class="guardi-body" data-guardi="youtube-limit-footer">
            This tab stays on Guardi's page until your daily YouTube time resets.
          </p>
          <a class="guardi-blocked-btn" id="guardi-back" href="newtab.html" data-guardi="youtube-limit-button">
            Take me somewhere safe
          </a>
        </section>
      </main>
    </div>
    <script src="guardi-shell.js"></script>
  </body>
</html>
